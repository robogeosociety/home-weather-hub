# Copy to config/stations.toml and fill in real values.
# Loaded by tempest-listener at startup; missing file is OK (no seeding).
# All fields except sensor_id and kind are optional.

[[stations]]
sensor_id = "tempest:ST-00027770"
kind      = "tempest"
label     = "Backyard Tempest"
location  = "outside"
latitude  = 47.6062
longitude = -122.3321

