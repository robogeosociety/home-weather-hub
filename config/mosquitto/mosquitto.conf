# Mosquitto config for the home-weather-hub LAN broker.
#
# This broker is reachable only on the home network — the listener binds
# 0.0.0.0 because containers are NATed onto the host's LAN interface, not
# because we want it open to the world. Do NOT expose 1883 to the internet.

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice
log_type information

# MQTT v3.1.1 / v5 over plain TCP for Zigbee2MQTT and the Python subscriber.
listener 1883 0.0.0.0
allow_anonymous true

# WebSocket listener for the (future) browser-side dashboard.
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true
